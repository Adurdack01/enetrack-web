<svg xmlns="http://www.w3.org/2000/svg" width="297mm" height="210mm" viewBox="0 0 2970 2100" preserveAspectRatio="xMidYMid meet">
  <defs>
    <marker id="arrowBlack" markerWidth="16" markerHeight="16" refX="15" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L16,8 L0,16 Z" fill="#111827"/>
    </marker>
    <marker id="arrowRed" markerWidth="16" markerHeight="16" refX="15" refY="8" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L16,8 L0,16 Z" fill="#dc2626"/>
    </marker>
    <style>
      .page { fill: #ffffff; stroke: #64748b; stroke-width: 3; }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2.5; }
      .title { font: 700 48px Arial, sans-serif; fill: #0f172a; }
      .laneTitle { font: 700 34px Arial, sans-serif; fill: #1f4d78; }
      .white { font: 700 34px Arial, sans-serif; fill: #ffffff; }
      .whiteSmall { font: 700 27px Arial, sans-serif; fill: #ffffff; }
      .dark { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .darkSmall { font: 700 27px Arial, sans-serif; fill: #0f172a; }
      .route { font: 700 26px Arial, sans-serif; fill: #0f172a; }
      .legend { font: 24px Arial, sans-serif; fill: #334155; }
      .process { fill: #4f87d5; stroke: #1f4d78; stroke-width: 3.5; }
      .input { fill: #d9ead3; stroke: #38761d; stroke-width: 3.5; }
      .decision { fill: #fff2cc; stroke: #bf9000; stroke-width: 3.5; }
      .storage { fill: #d9eaf7; stroke: #1f4d78; stroke-width: 3.5; }
      .terminal { fill: #e2e8f0; stroke: #475569; stroke-width: 3.5; }
      .arrow { fill: none; stroke: #111827; stroke-width: 5; marker-end: url(#arrowBlack); }
      .arrowRed { fill: none; stroke: #dc2626; stroke-width: 5; marker-end: url(#arrowRed); }
    </style>
  </defs>

  <rect class="page" x="25" y="25" width="2920" height="2050"/>
  <text class="title" x="1485" y="92" text-anchor="middle">Whole-System Flow Diagram</text>

  <rect class="lane" x="70" y="140" width="2830" height="500" rx="12"/>
  <rect class="lane" x="70" y="690" width="2830" height="610" rx="12"/>
  <rect class="lane" x="70" y="1350" width="2830" height="585" rx="12"/>

  <text class="laneTitle" x="110" y="190">1. Power-Up and Pairing</text>
  <text class="laneTitle" x="570" y="740">2. Energy Monitoring and Offline Synchronization</text>
  <text class="laneTitle" x="570" y="1400">3. App Control, Automation, and Appliance Output</text>

  <!-- Lane 1 -->
  <rect class="terminal" x="115" y="270" width="170" height="90" rx="45"/>
  <text class="dark" x="200" y="326" text-anchor="middle">Start</text>

  <polygon class="input" points="390,250 670,250 705,315 670,380 390,380 355,315"/>
  <text class="dark" x="530" y="307" text-anchor="middle">AC Mains</text>
  <text class="darkSmall" x="530" y="340" text-anchor="middle">Input</text>

  <rect class="process" x="820" y="245" width="300" height="140"/>
  <text class="white" x="970" y="303" text-anchor="middle">HLK-10M05</text>
  <text class="whiteSmall" x="970" y="338" text-anchor="middle">AC to 5V DC</text>

  <rect class="process" x="1235" y="245" width="330" height="140"/>
  <text class="white" x="1400" y="303" text-anchor="middle">ESP32 Boots</text>
  <text class="whiteSmall" x="1400" y="338" text-anchor="middle">Initializes modules</text>

  <polygon class="decision" points="1810,230 1950,315 1810,400 1670,315"/>
  <text class="dark" x="1810" y="308" text-anchor="middle">Device</text>
  <text class="darkSmall" x="1810" y="343" text-anchor="middle">Paired?</text>

  <rect class="process" x="2180" y="245" width="300" height="140"/>
  <text class="white" x="2330" y="303" text-anchor="middle">Connect</text>
  <text class="whiteSmall" x="2330" y="338" text-anchor="middle">to Wi-Fi</text>

  <rect class="process" x="1510" y="470" width="310" height="120"/>
  <text class="white" x="1665" y="518" text-anchor="middle">Pairing Mode</text>
  <text class="whiteSmall" x="1665" y="552" text-anchor="middle">Smart Plug hotspot</text>

  <polygon class="input" points="1910,465 2320,465 2355,530 2320,595 1910,595 1875,530"/>
  <text class="dark" x="2115" y="520" text-anchor="middle">User Enters Wi-Fi</text>
  <text class="darkSmall" x="2115" y="555" text-anchor="middle">Name, location, password</text>

  <rect class="storage" x="2470" y="470" width="300" height="120"/>
  <text class="dark" x="2620" y="518" text-anchor="middle">Register</text>
  <text class="darkSmall" x="2620" y="552" text-anchor="middle">in Firebase</text>

  <path class="arrow" d="M285,315 H355"/>
  <path class="arrow" d="M705,315 H820"/>
  <path class="arrow" d="M1120,315 H1235"/>
  <path class="arrow" d="M1565,315 H1670"/>
  <path class="arrow" d="M1950,315 H2180"/>
  <text class="route" x="2005" y="295">Yes</text>
  <path class="arrow" d="M1810,400 V435 H1665 V470"/>
  <text class="route" x="1830" y="435">No</text>
  <path class="arrow" d="M1820,530 H1875"/>
  <path class="arrow" d="M2355,530 H2470"/>
  <path class="arrow" d="M2620,470 V430 H2330 V385"/>

  <!-- Lane 2 -->
  <polygon class="input" points="115,850 510,850 550,945 510,1040 115,1040 75,945"/>
  <text class="dark" x="312" y="922" text-anchor="middle">PZEM-004T</text>
  <text class="darkSmall" x="312" y="958" text-anchor="middle">Reads V, A, W, kWh, PF</text>

  <rect class="process" x="710" y="850" width="390" height="190"/>
  <text class="white" x="905" y="910" text-anchor="middle">ESP32 Processes</text>
  <text class="whiteSmall" x="905" y="950" text-anchor="middle">Validates readings</text>
  <text class="whiteSmall" x="905" y="990" text-anchor="middle">Adds timestamp</text>

  <polygon class="decision" points="1375,825 1545,945 1375,1065 1205,945"/>
  <text class="dark" x="1375" y="938" text-anchor="middle">Internet</text>
  <text class="darkSmall" x="1375" y="974" text-anchor="middle">Available?</text>

  <rect class="storage" x="1720" y="850" width="380" height="190"/>
  <text class="dark" x="1910" y="910" text-anchor="middle">Firebase Database</text>
  <text class="darkSmall" x="1910" y="950" text-anchor="middle">Telemetry, status,</text>
  <text class="darkSmall" x="1910" y="990" text-anchor="middle">history, notifications</text>

  <polygon class="input" points="2320,850 2750,850 2790,945 2750,1040 2320,1040 2280,945"/>
  <text class="dark" x="2535" y="922" text-anchor="middle">Mobile App Displays</text>
  <text class="darkSmall" x="2535" y="958" text-anchor="middle">Dashboard, graph, cost, logs</text>

  <rect class="storage" x="1185" y="1135" width="380" height="120"/>
  <text class="dark" x="1375" y="1185" text-anchor="middle">MicroSD Card</text>
  <text class="darkSmall" x="1375" y="1220" text-anchor="middle">Stores offline logs</text>

  <polygon class="decision" points="1910,1115 2060,1195 1910,1275 1760,1195"/>
  <text class="dark" x="1910" y="1188" text-anchor="middle">Restored?</text>
  <text class="darkSmall" x="1910" y="1222" text-anchor="middle">Yes / No</text>

  <rect class="storage" x="2240" y="1135" width="360" height="120"/>
  <text class="dark" x="2420" y="1185" text-anchor="middle">Sync Offline Logs</text>
  <text class="darkSmall" x="2420" y="1220" text-anchor="middle">Upload and archive</text>

  <path class="arrow" d="M2330,385 V660 H312 V850"/>
  <path class="arrow" d="M550,945 H710"/>
  <path class="arrow" d="M1100,945 H1205"/>
  <path class="arrow" d="M1545,945 H1720"/>
  <text class="route" x="1608" y="920">Yes</text>
  <path class="arrow" d="M2100,945 H2280"/>
  <path class="arrow" d="M1375,1065 V1135"/>
  <text class="route" x="1395" y="1105">No</text>
  <path class="arrow" d="M1565,1195 H1760"/>
  <path class="arrow" d="M2060,1195 H2240"/>
  <text class="route" x="2105" y="1170">Yes</text>
  <path class="arrow" d="M1910,1275 V1290 H905 V1040"/>
  <text class="route" x="1940" y="1300">No, keep reading</text>
  <path class="arrow" d="M2420,1135 V1085 H1910 V1040"/>

  <!-- Lane 3 -->
  <polygon class="input" points="115,1515 500,1515 540,1605 500,1695 115,1695 75,1605"/>
  <text class="dark" x="308" y="1585" text-anchor="middle">User Command</text>
  <text class="darkSmall" x="308" y="1622" text-anchor="middle">App button or manual push button</text>

  <rect class="storage" x="700" y="1515" width="380" height="180"/>
  <text class="dark" x="890" y="1575" text-anchor="middle">Command Source</text>
  <text class="darkSmall" x="890" y="1615" text-anchor="middle">Firebase command</text>
  <text class="darkSmall" x="890" y="1655" text-anchor="middle">or local button input</text>

  <rect class="process" x="1240" y="1515" width="390" height="180"/>
  <text class="white" x="1435" y="1575" text-anchor="middle">ESP32 Checks</text>
  <text class="whiteSmall" x="1435" y="1615" text-anchor="middle">Relay command</text>
  <text class="whiteSmall" x="1435" y="1655" text-anchor="middle">Schedule or budget</text>

  <polygon class="decision" points="1870,1490 2045,1605 1870,1720 1695,1605"/>
  <text class="dark" x="1870" y="1588" text-anchor="middle">Relay State</text>
  <text class="darkSmall" x="1870" y="1625" text-anchor="middle">Needs Change?</text>

  <rect class="process" x="2215" y="1515" width="300" height="180"/>
  <text class="white" x="2365" y="1575" text-anchor="middle">Relay Module</text>
  <text class="whiteSmall" x="2365" y="1615" text-anchor="middle">Turns appliance</text>
  <text class="whiteSmall" x="2365" y="1655" text-anchor="middle">ON or OFF</text>

  <polygon class="input" points="2590,1515 2800,1515 2835,1605 2800,1695 2590,1695 2555,1605"/>
  <text class="dark" x="2695" y="1588" text-anchor="middle">Electrical</text>
  <text class="darkSmall" x="2695" y="1625" text-anchor="middle">Appliance</text>

  <polygon class="input" points="1240,1775 1630,1775 1670,1855 1630,1935 1240,1935 1200,1855"/>
  <text class="dark" x="1435" y="1838" text-anchor="middle">LED and Voice Prompt</text>
  <text class="darkSmall" x="1435" y="1875" text-anchor="middle">Local status feedback</text>

  <rect class="storage" x="1830" y="1785" width="360" height="140"/>
  <text class="dark" x="2010" y="1840" text-anchor="middle">Update Firebase</text>
  <text class="darkSmall" x="2010" y="1875" text-anchor="middle">Relay and command result</text>

  <path class="arrowRed" d="M2535,1040 V1325 H308 V1515"/>
  <path class="arrow" d="M540,1605 H700"/>
  <path class="arrow" d="M1080,1605 H1240"/>
  <path class="arrow" d="M1630,1605 H1695"/>
  <path class="arrow" d="M2045,1605 H2215"/>
  <text class="route" x="2095" y="1578">Yes</text>
  <path class="arrow" d="M2515,1605 H2555"/>
  <path class="arrow" d="M1870,1720 V1855 H1670"/>
  <text class="route" x="1905" y="1760">No</text>
  <path class="arrow" d="M1435,1695 V1775"/>
  <path class="arrow" d="M2010,1785 V1745 H2365 V1695"/>
  <path class="arrowRed" d="M2190,1855 H2535 V1040"/>

  <text class="legend" x="95" y="2020">Legend: green parallelogram = input/output, blue rectangle = process, yellow diamond = decision, light-blue rectangle = database/storage, red arrow = status/data returned to mobile display.</text>
</svg>
