<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Systematic System Flow Diagram</title>
    <style>
      @page {
        size: A4 landscape;
        margin: 8mm;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #e5e7eb;
        color: #0f172a;
        font-family: Arial, sans-serif;
      }

      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .page {
        width: 297mm;
        height: 210mm;
        background: #ffffff;
        box-shadow: 0 16px 42px rgba(15, 23, 42, 0.18);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 6mm;
      }

      img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      @media print {
        body {
          background: #ffffff;
        }

        main {
          min-height: auto;
          padding: 0;
        }

        .page {
          width: 100%;
          height: 100vh;
          box-shadow: none;
          padding: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="page" aria-label="A4 landscape diagram preview">
        <img
          src="./EnerTrack_Systematic_System_Flow_Diagram_Orthogonal.svg?v=2"
          alt="Systematic whole-system flow diagram with straight and 90-degree arrows"
        />
      </section>
    </main>
  </body>
</html>
