<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EnerTrack Phone Mockup</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background:
          radial-gradient(circle at 18% 18%, rgba(16, 185, 129, 0.16), transparent 28%),
          radial-gradient(circle at 84% 80%, rgba(15, 23, 42, 0.14), transparent 26%),
          linear-gradient(135deg, #f8fafc 0%, #e8f3ef 54%, #eef2ff 100%);
        color: #0f172a;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .stage {
        width: 1200px;
        height: 1600px;
        display: grid;
        place-items: center;
        overflow: hidden;
      }

      .phone {
        position: relative;
        width: 500px;
        height: 1042px;
        border-radius: 72px;
        background: #09090b;
        padding: 18px;
        box-shadow:
          0 50px 95px rgba(15, 23, 42, 0.26),
          0 18px 34px rgba(15, 23, 42, 0.2),
          inset 0 0 0 2px rgba(255, 255, 255, 0.1);
      }

      .phone::before {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 64px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        pointer-events: none;
      }

      .screen {
        position: relative;
        width: 100%;
        height: 100%;
        overflow: hidden;
        border-radius: 56px;
        background: #f8fafc;
      }

      .screen img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
        object-position: top center;
      }

      .island {
        position: absolute;
        top: 30px;
        left: 50%;
        z-index: 2;
        width: 142px;
        height: 40px;
        transform: translateX(-50%);
        border-radius: 999px;
        background: #070707;
        box-shadow: inset 0 1px 1px rgba(255, 255, 255, 0.12);
      }

      .side-button {
        position: absolute;
        right: -5px;
        top: 230px;
        width: 7px;
        height: 118px;
        border-radius: 999px;
        background: #18181b;
      }

      .volume-button {
        position: absolute;
        left: -5px;
        width: 7px;
        border-radius: 999px;
        background: #18181b;
      }

      .volume-button.one {
        top: 210px;
        height: 78px;
      }

      .volume-button.two {
        top: 306px;
        height: 104px;
      }
    </style>
  </head>
  <body>
    <main class="stage" aria-label="EnerTrack app phone mockup">
      <div class="phone">
        <div class="side-button"></div>
        <div class="volume-button one"></div>
        <div class="volume-button two"></div>
        <div class="screen">
          <img src="./enertrack-home-screen.png" alt="EnerTrack app Home screen" />
        </div>
        <div class="island"></div>
      </div>
    </main>
  </body>
</html>
