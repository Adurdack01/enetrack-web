<svg xmlns="http://www.w3.org/2000/svg" width="297mm" height="210mm" viewBox="0 0 2970 2100" preserveAspectRatio="xMidYMid meet">
  <defs>
    <marker id="arrowBlack" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 Z" fill="#111827"/>
    </marker>
    <marker id="arrowRed" markerWidth="14" markerHeight="14" refX="13" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L14,7 L0,14 Z" fill="#dc2626"/>
    </marker>
    <style>
      .page { fill: #ffffff; stroke: #64748b; stroke-width: 3; }
      .lane { fill: #f8fafc; stroke: #cbd5e1; stroke-width: 2; }
      .title { font: 700 42px Arial, sans-serif; fill: #0f172a; }
      .laneTitle { font: 700 28px Arial, sans-serif; fill: #1f4d78; }
      .shapeText { font: 700 25px Arial, sans-serif; fill: #ffffff; }
      .shapeTextSmall { font: 700 20px Arial, sans-serif; fill: #ffffff; }
      .darkText { font: 700 25px Arial, sans-serif; fill: #0f172a; }
      .darkSmall { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .note { font: 22px Arial, sans-serif; fill: #334155; }
      .routeLabel { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .process { fill: #4f87d5; stroke: #1f4d78; stroke-width: 3; }
      .input { fill: #d9ead3; stroke: #38761d; stroke-width: 3; }
      .decision { fill: #fff2cc; stroke: #bf9000; stroke-width: 3; }
      .storage { fill: #d9eaf7; stroke: #1f4d78; stroke-width: 3; }
      .terminal { fill: #e2e8f0; stroke: #475569; stroke-width: 3; }
      .arrow { fill: none; stroke: #111827; stroke-width: 4; marker-end: url(#arrowBlack); }
      .arrowRed { fill: none; stroke: #dc2626; stroke-width: 4; marker-end: url(#arrowRed); }
      .line { fill: none; stroke: #111827; stroke-width: 4; }
    </style>
  </defs>

  <rect class="page" x="25" y="25" width="2920" height="2050"/>
  <text class="title" x="1485" y="82" text-anchor="middle">Systematic Whole-System Flow Diagram</text>

  <rect class="lane" x="55" y="115" width="2860" height="500" rx="8"/>
  <rect class="lane" x="55" y="650" width="2860" height="575" rx="8"/>
  <rect class="lane" x="55" y="1260" width="2860" height="345" rx="8"/>
  <rect class="lane" x="55" y="1640" width="2860" height="390" rx="8"/>

  <text class="laneTitle" x="90" y="155">1. Power-Up and Pairing Flow</text>
  <text class="laneTitle" x="90" y="690">2. Energy Monitoring, Online Upload, and Offline Synchronization Flow</text>
  <text class="laneTitle" x="90" y="1300">3. Mobile Application and Cloud Command Flow</text>
  <text class="laneTitle" x="90" y="1680">4. Appliance Control and Local Feedback Flow</text>

  <!-- Row 1: setup -->
  <rect class="terminal" x="85" y="220" width="150" height="75" rx="38"/>
  <text class="darkText" x="160" y="266" text-anchor="middle">Start</text>

  <polygon class="input" points="310,210 560,210 590,258 560,305 310,305 280,258"/>
  <text class="darkText" x="435" y="251" text-anchor="middle">AC Mains</text>
  <text class="darkSmall" x="435" y="277" text-anchor="middle">Input</text>

  <rect class="process" x="665" y="205" width="260" height="105"/>
  <text class="shapeText" x="795" y="246" text-anchor="middle">HLK-10M05</text>
  <text class="shapeTextSmall" x="795" y="274" text-anchor="middle">AC to 5V DC</text>

  <rect class="process" x="1005" y="205" width="260" height="105"/>
  <text class="shapeText" x="1135" y="246" text-anchor="middle">5V Supply</text>
  <text class="shapeTextSmall" x="1135" y="274" text-anchor="middle">Power Rail</text>

  <rect class="process" x="1345" y="190" width="320" height="135"/>
  <text class="shapeText" x="1505" y="235" text-anchor="middle">ESP32 Boot</text>
  <text class="shapeTextSmall" x="1505" y="265" text-anchor="middle">Initialize firmware</text>
  <text class="shapeTextSmall" x="1505" y="293" text-anchor="middle">and modules</text>

  <rect class="process" x="1745" y="205" width="280" height="105"/>
  <text class="shapeText" x="1885" y="246" text-anchor="middle">Load Saved</text>
  <text class="shapeTextSmall" x="1885" y="274" text-anchor="middle">Settings</text>

  <polygon class="decision" points="2180,185 2310,258 2180,330 2050,258"/>
  <text class="darkText" x="2180" y="248" text-anchor="middle">Paired?</text>
  <text class="darkSmall" x="2180" y="276" text-anchor="middle">Yes / No</text>

  <rect class="process" x="2520" y="205" width="250" height="105"/>
  <text class="shapeText" x="2645" y="246" text-anchor="middle">Connect</text>
  <text class="shapeTextSmall" x="2645" y="274" text-anchor="middle">to Wi-Fi</text>

  <rect class="process" x="1210" y="430" width="270" height="105"/>
  <text class="shapeText" x="1345" y="470" text-anchor="middle">Pairing Mode</text>
  <text class="shapeTextSmall" x="1345" y="498" text-anchor="middle">Smart Plug hotspot</text>

  <polygon class="input" points="1575,430 1875,430 1905,483 1875,535 1575,535 1545,483"/>
  <text class="darkText" x="1725" y="472" text-anchor="middle">User Enters</text>
  <text class="darkSmall" x="1725" y="500" text-anchor="middle">Wi-Fi • Name • Password</text>

  <rect class="storage" x="1995" y="430" width="285" height="105"/>
  <text class="darkText" x="2138" y="470" text-anchor="middle">Register Device</text>
  <text class="darkSmall" x="2138" y="498" text-anchor="middle">in Firebase</text>

  <rect class="process" x="2380" y="430" width="255" height="105"/>
  <text class="shapeText" x="2508" y="470" text-anchor="middle">Restart ESP32</text>
  <text class="shapeTextSmall" x="2508" y="498" text-anchor="middle">after pairing</text>

  <path class="arrow" d="M235,258 H280"/>
  <path class="arrow" d="M590,258 H665"/>
  <path class="arrow" d="M925,258 H1005"/>
  <path class="arrow" d="M1265,258 H1345"/>
  <path class="arrow" d="M1665,258 H1745"/>
  <path class="arrow" d="M2025,258 H2050"/>
  <path class="arrow" d="M2310,258 H2520"/>
  <text class="routeLabel" x="2370" y="240">Yes</text>

  <path class="arrow" d="M2180,330 V375 H1345 V430"/>
  <text class="routeLabel" x="2195" y="365">No</text>
  <path class="arrow" d="M1480,483 H1545"/>
  <path class="arrow" d="M1905,483 H1995"/>
  <path class="arrow" d="M2280,483 H2380"/>
  <path class="arrow" d="M2635,483 H2825 V365 H2645 V310"/>

  <!-- Row 2: monitoring and sync -->
  <polygon class="input" points="110,765 395,765 425,830 395,895 110,895 80,830"/>
  <text class="darkText" x="253" y="808" text-anchor="middle">PZEM-004T</text>
  <text class="darkSmall" x="253" y="838" text-anchor="middle">Voltage • Current • Power</text>
  <text class="darkSmall" x="253" y="868" text-anchor="middle">Energy • PF • Frequency</text>

  <rect class="process" x="535" y="765" width="310" height="130"/>
  <text class="shapeText" x="690" y="805" text-anchor="middle">ESP32 Processes</text>
  <text class="shapeTextSmall" x="690" y="835" text-anchor="middle">Validate readings</text>
  <text class="shapeTextSmall" x="690" y="865" text-anchor="middle">Compute telemetry</text>

  <rect class="process" x="955" y="780" width="280" height="100"/>
  <text class="shapeText" x="1095" y="820" text-anchor="middle">Timestamp</text>
  <text class="shapeTextSmall" x="1095" y="848" text-anchor="middle">NTP or RTC</text>

  <polygon class="decision" points="1420,750 1560,830 1420,910 1280,830"/>
  <text class="darkText" x="1420" y="820" text-anchor="middle">Internet</text>
  <text class="darkSmall" x="1420" y="850" text-anchor="middle">Available?</text>

  <rect class="storage" x="1700" y="765" width="330" height="130"/>
  <text class="darkText" x="1865" y="805" text-anchor="middle">Firebase Upload</text>
  <text class="darkSmall" x="1865" y="835" text-anchor="middle">Telemetry • Status</text>
  <text class="darkSmall" x="1865" y="865" text-anchor="middle">History records</text>

  <polygon class="input" points="2180,765 2540,765 2570,830 2540,895 2180,895 2150,830"/>
  <text class="darkText" x="2360" y="808" text-anchor="middle">Mobile App Output</text>
  <text class="darkSmall" x="2360" y="838" text-anchor="middle">Dashboard • Graphs • Logs</text>
  <text class="darkSmall" x="2360" y="868" text-anchor="middle">Cost • Reports • Status</text>

  <rect class="storage" x="1265" y="1035" width="310" height="110"/>
  <text class="darkText" x="1420" y="1078" text-anchor="middle">MicroSD Storage</text>
  <text class="darkSmall" x="1420" y="1108" text-anchor="middle">Offline readings</text>

  <polygon class="decision" points="1865,1010 2010,1090 1865,1170 1720,1090"/>
  <text class="darkText" x="1865" y="1080" text-anchor="middle">Connection</text>
  <text class="darkSmall" x="1865" y="1110" text-anchor="middle">Restored?</text>

  <rect class="storage" x="2180" y="1035" width="310" height="110"/>
  <text class="darkText" x="2335" y="1078" text-anchor="middle">Sync Offline Logs</text>
  <text class="darkSmall" x="2335" y="1108" text-anchor="middle">Upload and archive</text>

  <path class="arrow" d="M2645,310 V625 H253 V765"/>
  <path class="arrow" d="M425,830 H535"/>
  <path class="arrow" d="M845,830 H955"/>
  <path class="arrow" d="M1235,830 H1280"/>
  <path class="arrow" d="M1560,830 H1700"/>
  <text class="routeLabel" x="1605" y="810">Yes</text>
  <path class="arrow" d="M2030,830 H2150"/>
  <path class="arrow" d="M1420,910 V1035"/>
  <text class="routeLabel" x="1438" y="965">No</text>
  <path class="arrow" d="M1575,1090 H1720"/>
  <path class="arrow" d="M2010,1090 H2180"/>
  <text class="routeLabel" x="2048" y="1072">Yes</text>
  <path class="arrow" d="M1865,1170 V1195 H690 V895"/>
  <text class="routeLabel" x="1900" y="1205">No, keep reading</text>
  <path class="arrow" d="M2335,1035 V960 H1865 V895"/>

  <!-- Row 3: app and cloud command flow -->
  <polygon class="input" points="110,1370 360,1370 390,1435 360,1500 110,1500 80,1435"/>
  <text class="darkText" x="235" y="1425" text-anchor="middle">User Opens App</text>
  <text class="darkSmall" x="235" y="1455" text-anchor="middle">or changes setting</text>

  <rect class="process" x="510" y="1375" width="275" height="120"/>
  <text class="shapeText" x="648" y="1420" text-anchor="middle">Authenticate</text>
  <text class="shapeTextSmall" x="648" y="1450" text-anchor="middle">Load account</text>

  <rect class="storage" x="905" y="1375" width="310" height="120"/>
  <text class="darkText" x="1060" y="1415" text-anchor="middle">Retrieve Data</text>
  <text class="darkSmall" x="1060" y="1445" text-anchor="middle">Devices • Logs • Settings</text>
  <text class="darkSmall" x="1060" y="1473" text-anchor="middle">Notifications • Sharing</text>

  <polygon class="decision" points="1435,1360 1580,1435 1435,1510 1290,1435"/>
  <text class="darkText" x="1435" y="1425" text-anchor="middle">Command or</text>
  <text class="darkSmall" x="1435" y="1455" text-anchor="middle">setting change?</text>

  <rect class="storage" x="1720" y="1375" width="330" height="120"/>
  <text class="darkText" x="1885" y="1415" text-anchor="middle">Write to Firebase</text>
  <text class="darkSmall" x="1885" y="1445" text-anchor="middle">Relay • Schedule • Budget</text>
  <text class="darkSmall" x="1885" y="1473" text-anchor="middle">Protection • Configuration</text>

  <rect class="process" x="2170" y="1375" width="305" height="120"/>
  <text class="shapeText" x="2323" y="1420" text-anchor="middle">ESP32 Polls</text>
  <text class="shapeTextSmall" x="2323" y="1450" text-anchor="middle">Pending commands</text>

  <path class="arrow" d="M390,1435 H510"/>
  <path class="arrow" d="M785,1435 H905"/>
  <path class="arrow" d="M1215,1435 H1290"/>
  <path class="arrow" d="M1580,1435 H1720"/>
  <text class="routeLabel" x="1628" y="1418">Yes</text>
  <path class="arrow" d="M2050,1435 H2170"/>
  <path class="arrow" d="M1435,1510 V1572 H1060 V1495"/>
  <text class="routeLabel" x="1460" y="1544">No</text>

  <!-- Row 4: control -->
  <polygon class="input" points="110,1745 380,1745 410,1815 380,1885 110,1885 80,1815"/>
  <text class="darkText" x="245" y="1798" text-anchor="middle">Manual Button</text>
  <text class="darkSmall" x="245" y="1828" text-anchor="middle">or automation trigger</text>

  <polygon class="decision" points="690,1735 840,1815 690,1895 540,1815"/>
  <text class="darkText" x="690" y="1805" text-anchor="middle">Schedule /</text>
  <text class="darkSmall" x="690" y="1835" text-anchor="middle">Budget reached?</text>

  <polygon class="decision" points="1095,1735 1245,1815 1095,1895 945,1815"/>
  <text class="darkText" x="1095" y="1805" text-anchor="middle">Relay State</text>
  <text class="darkSmall" x="1095" y="1835" text-anchor="middle">Needs Change?</text>

  <rect class="process" x="1385" y="1750" width="280" height="130"/>
  <text class="shapeText" x="1525" y="1795" text-anchor="middle">Relay Module</text>
  <text class="shapeTextSmall" x="1525" y="1825" text-anchor="middle">Switches load</text>
  <text class="shapeTextSmall" x="1525" y="1853" text-anchor="middle">ON / OFF</text>

  <polygon class="input" points="1810,1750 2100,1750 2130,1815 2100,1880 1810,1880 1780,1815"/>
  <text class="darkText" x="1955" y="1805" text-anchor="middle">Electrical Appliance</text>
  <text class="darkSmall" x="1955" y="1835" text-anchor="middle">Controlled load</text>

  <rect class="storage" x="2285" y="1750" width="280" height="130"/>
  <text class="darkText" x="2425" y="1795" text-anchor="middle">Update Firebase</text>
  <text class="darkSmall" x="2425" y="1825" text-anchor="middle">Command result</text>
  <text class="darkSmall" x="2425" y="1853" text-anchor="middle">and relay state</text>

  <polygon class="input" points="2605,1750 2820,1750 2850,1815 2820,1880 2605,1880 2575,1815"/>
  <text class="darkText" x="2712" y="1805" text-anchor="middle">LED / Voice</text>
  <text class="darkSmall" x="2712" y="1835" text-anchor="middle">Local feedback</text>

  <path class="arrow" d="M2323,1495 V1620 H245 V1745"/>
  <path class="arrow" d="M410,1815 H540"/>
  <path class="arrow" d="M840,1815 H945"/>
  <path class="arrow" d="M1245,1815 H1385"/>
  <text class="routeLabel" x="1288" y="1798">Yes</text>
  <path class="arrow" d="M1665,1815 H1780"/>
  <path class="arrow" d="M2130,1815 H2285"/>
  <path class="arrow" d="M2565,1815 H2575"/>
  <path class="arrow" d="M1095,1895 V1960 H2712 V1880"/>
  <text class="routeLabel" x="1122" y="1925">No, status only</text>
  <path class="arrowRed" d="M2712,1750 V1618 H2360 V895"/>

  <rect class="terminal" x="2635" y="1945" width="160" height="70" rx="35"/>
  <text class="darkText" x="2715" y="1989" text-anchor="middle">Loop</text>
  <path class="arrow" d="M2712,1880 V1945"/>
  <path class="arrow" d="M2635,1980 H690 V895"/>

  <text class="note" x="90" y="2055">Legend: green parallelogram = input/output, blue rectangle = process, yellow diamond = decision, light-blue rectangle = database/storage, red arrow = status/data returned to app display.</text>
</svg>
